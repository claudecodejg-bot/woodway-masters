name: Update Leaderboard

on:
  schedule:
    # Every 5 minutes, Mon–Sun, 10:00–03:59 UTC (6am ET – 11:59pm ET)
    - cron: '*/5 10-23 * * *'
    - cron: '*/5 0-3 * * *'
  workflow_dispatch:   # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch leaderboard from ESPN
        run: python scripts/fetch_leaderboard.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard [skip ci]"
          git push
